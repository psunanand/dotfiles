# ============================================= #
# CORE SERVER SETTINGS
# ============================================= #
# Set default terminal and enable true color support
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -sa terminal-features ',kitty:RGB'

set -g mouse on
set -s escape-time 0           # Eliminate Neovim 'Esc' lag
set -g history-limit 50000     # Increase scrollback for data processing
set -g focus-events on
set -g renumber-windows on     # Keep window numbering sequential
set -g base-index 1            # Start indexing at 1 (matches keyboard layout)
setw -g pane-base-index 1
set -g pane-active-border-style 'fg=green,bold'
set -g pane-border-style 'fg=colour240'
set -g pane-border-status top
set -g pane-border-format ' #{?window_zoomed_flag,#[fg=black]#[bg=yellow] ZOOMED #[default] ,}#{pane_index}: #{pane_title} '

set -g status-position top
set -g status-style 'bg=colour235,fg=colour248'
set -g status-left '#[fg=colour220,bold] #S #{?window_zoomed_flag,#[fg=red] [Z] ,}'
set -g status-left-length 30

# Use Zsh as the default shell (Homebrew path)
set -g default-shell /opt/homebrew/bin/zsh
set -g default-command "$SHELL"

# ============================================= #
# NAVIGATION & KEYBINDINGS
# ============================================= #
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vi mode for copy/paste
set -g status-keys vi
set -g mode-keys vi

# Reload config
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux configuration"

# Hard Kill: Prompt before destroying the entire session
bind Q confirm-before -p "Kill session #S? (y/n)" kill-session

# Pane Splitting (Nvim style)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Tab Creation (Prefix + t)
bind t new-window -c "#{pane_current_path}"

# Seamlessly switch between Vim splits and Tmux panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Clear screen with Prefix + Ctrl + l
bind C-l send-keys 'C-l'

# Pane Resizing (Repeatable: Prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Renaming (Home-row friendly)
bind n command-prompt -I "#W" "rename-window '%%'"
bind p command-prompt -I "#P" "rename-pane '%%'"

# Toggle pane zoom (Maximize focus)
# Default is Prefix + z, but we make it more intuitive
bind -r f resize-pane -Z

# Equalize panes (Balanced layout)
bind = select-layout even-horizontal
bind _ select-layout even-vertical

# ============================================= #
# ACTIVITY & MONITORING
# ============================================= #
setw -g monitor-activity on    # Highlight window in status bar on update
set -g visual-activity off     # Disable "Activity in window X" toast (distracting)
setw -g automatic-rename off   # Prevent shell commands from renaming your tabs

# ============================================= #
# PLUGINS (via TPM)
# ============================================= #
# Install with prefix + I

# TPM location
set -g @plugin 'tmux-plugins/tpm'
set -g @tpm-clean 'K'

# Plugin List
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin-Specific Config
set -g @resurrect-save 'S'
set -g @resurrect-restore 'L'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Tmux-Yank Configuration
set -g @yank_with_mouse on                          # Drag to copy
set -g @yank_selection_mouse 'clipboard'            # Primary clipboard

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'
