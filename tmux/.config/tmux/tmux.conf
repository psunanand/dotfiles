# ============================================= #
# TERMINAL & SESSION SETTINGS
# ============================================= #

# Set default terminal and enable true color support
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -sa terminal-features ',kitty:RGB'

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Use Zsh as the default shell (Homebrew path)
set -g default-shell /bin/zsh
set -g default-command "$SHELL"

# General Behavior
set -g mouse on
set -s escape-time 0
set -g history-limit 10000
set-option -g focus-events on
set-option -s extended-keys on
set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

# Status bar position
set-option -g status-position bottom

# ============================================= #
# KEYBINDINGS
# ============================================= #

# Change Prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vi mode for copy/paste
set -g status-keys vi
set -g mode-keys vi

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux configuration"

# Pane Splitting (Nvim style)
unbind v
unbind s
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Tab Creation (Prefix + t)
unbind c
bind t new-window -c "#{pane_current_path}"

# Pane Navigation (HJKL)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Clear screen with Prefix + Ctrl + l
bind -n C-l send-keys 'C-l'

# Pane Resizing
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5

# ============================================= #
# PLUGINS (via TPM)
# ============================================= #
# Install with prefix + I

# TPM location
set -g @plugin 'tmux-plugins/tpm'

# Plugin List
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'laktak/extrakto'

# Theme: everforest
set -g @plugin 'TanglingTreats/tmux-everforest'
set -g @tmux-everforest 'dark-medium'

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'
